<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Cabeçalho -->
    <header class="header">
        <h1>Receitas</h1>
    </header>

    <!-- Conteúdo principal -->
    <main class="main">

        <!-- Barra de pesquisa -->
        <div class="search-bar">
            <input type="text" id="pesquisa" placeholder="Pesquisar receitas...">
        </div>

        <!-- Filtros -->
        <div class="filtros">
            <button class="filtro active" onclick="filtrarPor('todos')">Todos</button>
            <button class="filtro" onclick="filtrarPor('favoritos')">❤️ Favoritos</button>
            <div class="filtro-separador"></div>
            <div id="filtros-categorias"></div>
        </div>

        <!-- Lista de receitas -->
        <div class="receitas-grid" id="receitas-grid">
            <!-- As receitas aparecem aqui -->
        </div>

    </main>

    <!-- Barra de navegação inferior -->
    <nav class="nav-bottom">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Receitas</span>
        </a>
        <a href="adicionar.html" class="nav-item">
            <span class="nav-icon">➕</span>
            <span class="nav-label">Adicionar</span>
        </a>
        <a href="favoritos.html" class="nav-item">
            <span class="nav-icon">❤️</span>
            <span class="nav-label">Favoritos</span>
        </a>
    </nav>

    <script src="js/app.js"></script>

</body>
</html>
